name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pinned gitleaks release
        run: |
          set -euo pipefail
          VERSION="8.24.2"
          ARCHIVE="gitleaks_${VERSION}_linux_x64.tar.gz"
          CHECKSUMS="gitleaks_${VERSION}_checksums.txt"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"

          curl -fsSLO "${BASE_URL}/${ARCHIVE}"
          curl -fsSLO "${BASE_URL}/${CHECKSUMS}"

          CHECKSUM_LINE="$(grep "  ${ARCHIVE}$" "${CHECKSUMS}" || true)"
          if [ -z "${CHECKSUM_LINE}" ]; then
            echo "ERROR: checksum line for ${ARCHIVE} not found in ${CHECKSUMS}" >&2
            exit 1
          fi
          printf '%s\n' "${CHECKSUM_LINE}" | sha256sum --check --status

          tar -xzf "${ARCHIVE}" gitleaks
          chmod +x gitleaks

      - name: Run secret scan
        run: |
          ./gitleaks git --source . --redact --exit-code 1
