name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pinned gitleaks release
        run: |
          set -euo pipefail
          VERSION="8.24.2"
          ARCHIVE="gitleaks_${VERSION}_linux_x64.tar.gz"
          ARCHIVE_SHA256="fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"

          curl -fsSLO "${BASE_URL}/${ARCHIVE}"
          echo "${ARCHIVE_SHA256}  ${ARCHIVE}" | sha256sum --check --status

          tar -xzf "${ARCHIVE}" gitleaks
          chmod +x gitleaks

      - name: Run secret scan
        run: |
          ./gitleaks detect --source . --redact --exit-code 1
