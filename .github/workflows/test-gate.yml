name: Test Gate

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: vendor
      UV_PROJECT_ENVIRONMENT: ${{ github.workspace }}/.gm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.14"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install project + dev tools (locked)
        run: uv sync --frozen

      - name: Run security regression test gate
        run: |
          uv run python -m unittest \
            tests.test_blindbox_state_wrap \
            tests.test_asyncio_regression \
            tests.test_blindbox_client \
            tests.test_atomic_writes \
            tests.test_chat_history \
            tests.test_history_ui_guards \
            tests.test_profile_import_overwrite \
            tests.test_protocol_framing_vnext \
            tests.test_sam_input_validation \
            tests.test_audit_remediation

      - name: Pytest suite
        run: uv run pytest tests/ -q --tb=short
