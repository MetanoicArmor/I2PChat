name: Nix Flake Check

on:
  push:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**.py'
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - '**.py'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      
      - name: Check flake
        run: nix flake check
      
      - name: Build package
        run: nix build --print-build-logs
