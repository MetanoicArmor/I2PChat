name: Security Dependency Audit

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-ci-audit.txt

      - name: Audit dependencies
        run: |
          # Primary gate: audit the exact hash-locked dependency graph used in builds.
          pip-audit -r requirements.txt
          # Build-time toolchain dependencies must also be audited.
          pip-audit -r requirements-build.txt
          # Supplemental signal: unresolved input constraints.
          pip-audit -r requirements.in

  release-integrity-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Enforce signed release artifact policy
        run: |
          python - <<'PY'
          from pathlib import Path

          scripts = [
              "build-linux.sh",
              "build-macos.sh",
              "build-windows.ps1",
          ]
          required_tokens = ("SHA256SUMS", "SHA256SUMS.asc", "gpg")

          missing = {}
          for rel_path in scripts:
              content = Path(rel_path).read_text(encoding="utf-8")
              absent = [token for token in required_tokens if token not in content]
              if absent:
                  missing[rel_path] = absent

          if missing:
              details = "; ".join(
                  f"{path}: missing {', '.join(tokens)}"
                  for path, tokens in missing.items()
              )
              raise SystemExit(f"Release-signing policy violation: {details}")
          PY

  supply-chain-governance-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Enforce vendored provenance and flake lock policy
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          provenance_path = Path("i2plib/VENDORED_UPSTREAM.json")
          if not provenance_path.exists():
              raise SystemExit("Missing vendored provenance file: i2plib/VENDORED_UPSTREAM.json")

          data = json.loads(provenance_path.read_text(encoding="utf-8"))
          required_top = ("component", "strategy", "upstream", "review_policy", "last_reviewed_utc")
          missing_top = [k for k in required_top if k not in data]
          if missing_top:
              raise SystemExit(f"Invalid vendored provenance metadata: missing {missing_top}")
          if data.get("strategy") != "vendored":
              raise SystemExit("Invalid vendored provenance strategy marker")

          lock_path = Path("flake.lock")
          if not lock_path.exists():
              raise SystemExit("Missing flake.lock")
          lock_data = json.loads(lock_path.read_text(encoding="utf-8"))
          nodes = lock_data.get("nodes", {})
          nixpkgs = nodes.get("nixpkgs", {})
          nixpkgs_locked = nixpkgs.get("locked", {})
          if not nixpkgs_locked.get("rev"):
              raise SystemExit("flake.lock must pin nixpkgs.locked.rev")
          if lock_data.get("version") != 7:
              raise SystemExit("flake.lock version must be 7")
          PY
