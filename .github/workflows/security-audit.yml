name: Security Dependency Audit

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.6.14"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Audit locked runtime dependencies
        run: |
          uv export --frozen --no-dev --no-emit-project -o /tmp/audit-runtime.txt
          uvx pip-audit==2.9.0 --require-hashes -r /tmp/audit-runtime.txt

      - name: Audit locked build dependencies
        run: |
          uv export --frozen --only-group build --no-emit-project -o /tmp/audit-build.txt
          uvx pip-audit==2.9.0 --require-hashes -r /tmp/audit-build.txt

  release-integrity-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Enforce signed release artifact policy
        run: |
          python - <<'PY'
          from pathlib import Path

          scripts = [
              "build-linux.sh",
              "build-macos.sh",
              "build-windows.ps1",
          ]
          required_tokens = ("SHA256SUMS", "SHA256SUMS.asc", "gpg")

          missing = {}
          for rel_path in scripts:
              content = Path(rel_path).read_text(encoding="utf-8")
              absent = [token for token in required_tokens if token not in content]
              if absent:
                  missing[rel_path] = absent

          if missing:
              details = "; ".join(
                  f"{path}: missing {', '.join(tokens)}"
                  for path, tokens in missing.items()
              )
              raise SystemExit(f"Release-signing policy violation: {details}")
          PY

  supply-chain-governance-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Enforce internal SAM backend and flake lock policy
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          sam_pkg = Path("i2pchat/sam/__init__.py")
          if not sam_pkg.is_file():
              raise SystemExit("Missing internal SAM package: i2pchat/sam/__init__.py")
          sam_text = sam_pkg.read_text(encoding="utf-8")
          if "create_session" not in sam_text:
              raise SystemExit("i2pchat.sam package must export create_session")

          lock_path = Path("flake.lock")
          if not lock_path.exists():
              raise SystemExit("Missing flake.lock")
          lock_data = json.loads(lock_path.read_text(encoding="utf-8"))
          nodes = lock_data.get("nodes", {})
          nixpkgs = nodes.get("nixpkgs", {})
          nixpkgs_locked = nixpkgs.get("locked", {})
          if not nixpkgs_locked.get("rev"):
              raise SystemExit("flake.lock must pin nixpkgs.locked.rev")
          if lock_data.get("version") != 7:
              raise SystemExit("flake.lock version must be 7")
          PY
