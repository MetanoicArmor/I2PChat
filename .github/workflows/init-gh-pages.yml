# Legacy: creates branch gh-pages for "Deploy from a branch" Pages.
# Current apt mirror uses GitHub Actions → Pages (artifact); see packaging/apt/README.md.
# Run this only if you still want a branch-based Pages setup without Actions deploy.
name: Init gh-pages branch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Create minimal site placeholder
        run: |
          mkdir -p site
          touch site/.nojekyll
          printf '%s\n' \
            '<!DOCTYPE html><html><head><meta charset="utf-8"><title>I2PChat apt</title></head>' \
            '<body><p>I2PChat apt mirror — content is deployed by GitHub Actions ' \
            '(<code>Publish apt mirror</code> or <code>Release Linux packages</code>).</p>' \
            '<p>See <a href="https://github.com/${{ github.repository }}/blob/main/packaging/apt/README.md">packaging/apt/README.md</a>.</p></body></html>' \
            > site/index.html

      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          force_orphan: true
