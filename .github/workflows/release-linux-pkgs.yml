# Build amd64 .deb and x86_64 .rpm from the published Linux zip and attach to the same release.
# Triggers: release published (linux zip must already be on the asset list), or workflow_dispatch with tag vX.Y.Z.
name: Release Linux packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3) — existing release with I2PChat-linux-x86_64-v*.zip; uploads .deb + .rpm"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deb:
    runs-on: ubuntu-latest
    outputs:
      apt_publish: ${{ steps.apt_pages.outputs.publish }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev unzip curl

      - name: Derive version from release tag
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VER="${TAG#v}"
          if [ -z "$VER" ]; then
            echo "ERROR: empty version from tag: $TAG" >&2
            exit 1
          fi
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            :
          elif gh release view "v${VER}" --repo "$REPO" >/dev/null 2>&1; then
            TAG="v${VER}"
          else
            echo "ERROR: no release for tag '$TAG' or 'v${VER}' in ${REPO}" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      # release:published can fire before large assets finish uploading; wait via API then curl retries in script.
      - name: Wait for Linux GUI zip on release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ steps.meta.outputs.tag }}"
          VER="${{ steps.meta.outputs.ver }}"
          WANT="I2PChat-linux-x86_64-v${VER}.zip"
          for i in $(seq 1 36); do
            if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "$WANT"; then
              echo "Asset present: $WANT"
              exit 0
            fi
            echo "Waiting for $WANT on $REPO@$TAG (try $i/36)..."
            sleep 10
          done
          echo "Timed out waiting for $WANT. Assets on this release:" >&2
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' >&2 || true
          exit 1

      - name: Build .deb from release zip
        run: ./packaging/debian/build-deb-from-appimage.sh "${{ steps.meta.outputs.ver }}"

      - name: Upload .deb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "dist/i2pchat_${{ steps.meta.outputs.ver }}_amd64.deb" \
            --clobber

      - name: Publish apt mirror to GitHub Pages (optional)
        id: apt_pages
        env:
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
          APT_REPO_GPG_PASSPHRASE: ${{ secrets.APT_REPO_GPG_PASSPHRASE }}
        run: |
          if [ -z "${APT_REPO_GPG_PRIVATE_KEY:-}" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping apt GitHub Pages: set secret APT_REPO_GPG_PRIVATE_KEY (see packaging/apt/README.md)"
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y apt-utils gnupg
          chmod +x packaging/apt/scripts/build-apt-site.sh packaging/apt/scripts/sign-release.sh
          export VERSION="${{ steps.meta.outputs.ver }}"
          export DEB_PATH="${{ github.workspace }}/dist/i2pchat_${VERSION}_amd64.deb"
          ./packaging/apt/scripts/build-apt-site.sh
          echo "$APT_REPO_GPG_PRIVATE_KEY" | gpg --import --batch
          export APT_REPO_GPG_PASSPHRASE
          ./packaging/apt/scripts/sign-release.sh
          echo "publish=true" >> "$GITHUB_OUTPUT"

      # Large .deb cannot be pushed to git (100 MB limit); Pages via Actions artifact can serve it.
      - name: Configure GitHub Pages
        if: steps.apt_pages.outputs.publish == 'true'
        uses: actions/configure-pages@v5

      - name: Upload apt site (Pages artifact)
        if: steps.apt_pages.outputs.publish == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: packaging/apt/site

  deploy-apt-site:
    name: Deploy apt to GitHub Pages
    needs: deb
    if: needs.deb.outputs.apt_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive version from release tag
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VER="${TAG#v}"
          if [ -z "$VER" ]; then
            echo "ERROR: empty version from tag: $TAG" >&2
            exit 1
          fi
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            :
          elif gh release view "v${VER}" --repo "$REPO" >/dev/null 2>&1; then
            TAG="v${VER}"
          else
            echo "ERROR: no release for tag '$TAG' or 'v${VER}' in ${REPO}" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Wait for Linux GUI zip on release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ steps.meta.outputs.tag }}"
          VER="${{ steps.meta.outputs.ver }}"
          WANT="I2PChat-linux-x86_64-v${VER}.zip"
          for i in $(seq 1 36); do
            if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "$WANT"; then
              echo "Asset present: $WANT"
              exit 0
            fi
            echo "Waiting for $WANT on $REPO@$TAG (try $i/36)..."
            sleep 10
          done
          echo "Timed out waiting for $WANT. Assets on this release:" >&2
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' >&2 || true
          exit 1

      - name: Build RPM in Fedora container
        run: |
          docker run --rm \
            -e "GITHUB_REPOSITORY=${{ github.repository }}" \
            -e "GITHUB_ACTIONS=true" \
            -v "${{ github.workspace }}:/workspace:rw" \
            -w /workspace \
            fedora:42 \
            bash /workspace/packaging/fedora/build-rpm-from-release.sh "${{ steps.meta.outputs.ver }}"

      - name: Upload RPM to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "dist/i2pchat_${{ steps.meta.outputs.ver }}_x86_64.rpm" \
            --clobber
