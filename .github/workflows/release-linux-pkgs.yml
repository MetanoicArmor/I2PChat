# Build .deb packages (GUI + TUI) from published Linux zips and attach to the same release.
# amd64 from x86_64 zips; arm64 from aarch64 zips.
# Triggers: release published, or workflow_dispatch with tag vX.Y.Z.
name: Release Linux packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3) — Linux zips on release; uploads i2pchat + i2pchat-tui (.deb amd64 + arm64)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      ver: ${{ steps.meta.outputs.ver }}
    steps:
      - name: Derive version from release tag
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VER="${TAG#v}"
          if [ -z "$VER" ]; then
            echo "ERROR: empty version from tag: $TAG" >&2
            exit 1
          fi
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            :
          elif gh release view "v${VER}" --repo "$REPO" >/dev/null 2>&1; then
            TAG="v${VER}"
          else
            echo "ERROR: no release for tag '$TAG' or 'v${VER}' in ${REPO}" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

  deb-amd64:
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      apt_publish: ${{ steps.apt_pages.outputs.publish }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev unzip curl

      - name: Wait for Linux GUI zip on release (x86_64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ needs.meta.outputs.tag }}"
          VER="${{ needs.meta.outputs.ver }}"
          WANT="I2PChat-linux-x86_64-v${VER}.zip"
          for i in $(seq 1 36); do
            if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "$WANT"; then
              echo "Asset present: $WANT"
              exit 0
            fi
            echo "Waiting for $WANT on $REPO@$TAG (try $i/36)..."
            sleep 10
          done
          echo "Timed out waiting for $WANT." >&2
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' >&2 || true
          exit 1

      - name: Wait for Linux TUI zip on release (x86_64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ needs.meta.outputs.tag }}"
          VER="${{ needs.meta.outputs.ver }}"
          WANT="I2PChat-linux-x86_64-tui-v${VER}.zip"
          for i in $(seq 1 36); do
            if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "$WANT"; then
              echo "Asset present: $WANT"
              exit 0
            fi
            echo "Waiting for $WANT on $REPO@$TAG (try $i/36)..."
            sleep 10
          done
          echo "Timed out waiting for $WANT." >&2
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' >&2 || true
          exit 1

      - name: Build .deb from release zip (GUI, amd64)
        run: ./packaging/debian/build-deb-from-appimage.sh "${{ needs.meta.outputs.ver }}"

      - name: Build .deb from TUI release zip (amd64)
        run: ./packaging/debian/build-tui-deb-from-release-zip.sh "${{ needs.meta.outputs.ver }}"

      - name: Upload amd64 .deb packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.meta.outputs.tag }}" \
            "dist/i2pchat_${{ needs.meta.outputs.ver }}_amd64.deb" \
            "dist/i2pchat-tui_${{ needs.meta.outputs.ver }}_amd64.deb" \
            --clobber

      - name: Wait for arm64 .deb on release (optional, multi-arch apt)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ needs.meta.outputs.tag }}"
          VER="${{ needs.meta.outputs.ver }}"
          for i in $(seq 1 72); do
            if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "i2pchat_${VER}_arm64.deb" \
              && gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "i2pchat-tui_${VER}_arm64.deb"; then
              echo "arm64 .deb packages on release"
              exit 0
            fi
            echo "Waiting for arm64 .deb on release (try $i/72)..."
            sleep 10
          done
          echo "WARN: arm64 .deb not found after wait — apt mirror will be amd64-only"
          exit 0

      - name: Download arm64 .deb for apt site (optional)
        id: arm64deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ needs.meta.outputs.ver }}"
          TAG="${{ needs.meta.outputs.tag }}"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "i2pchat_${VER}_arm64.deb"; then
            gh release download "$TAG" --repo "$REPO" -p "i2pchat_${VER}_arm64.deb" -p "i2pchat-tui_${VER}_arm64.deb" -D "${{ github.workspace }}"
            echo "has_arm64=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_arm64=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish apt mirror to GitHub Pages (optional)
        id: apt_pages
        env:
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
          APT_REPO_GPG_PASSPHRASE: ${{ secrets.APT_REPO_GPG_PASSPHRASE }}
        run: |
          if [ -z "${APT_REPO_GPG_PRIVATE_KEY:-}" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Skipping apt GitHub Pages: set secret APT_REPO_GPG_PRIVATE_KEY (see packaging/apt/README.md)"
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y apt-utils gnupg
          chmod +x packaging/apt/scripts/build-apt-site.sh packaging/apt/scripts/sign-release.sh
          export VERSION="${{ needs.meta.outputs.ver }}"
          export DEB_PATH="${{ github.workspace }}/dist/i2pchat_${VERSION}_amd64.deb"
          export DEB_PATH_2="${{ github.workspace }}/dist/i2pchat-tui_${VERSION}_amd64.deb"
          if [ "${{ steps.arm64deb.outputs.has_arm64 }}" = "true" ]; then
            export DEB_ARM64_PATH="${{ github.workspace }}/i2pchat_${VERSION}_arm64.deb"
            export DEB_ARM64_PATH_2="${{ github.workspace }}/i2pchat-tui_${VERSION}_arm64.deb"
          fi
          ./packaging/apt/scripts/build-apt-site.sh
          echo "$APT_REPO_GPG_PRIVATE_KEY" | gpg --import --batch
          export APT_REPO_GPG_PASSPHRASE
          ./packaging/apt/scripts/sign-release.sh
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Pages
        if: steps.apt_pages.outputs.publish == 'true'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload apt site (Pages artifact)
        if: steps.apt_pages.outputs.publish == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: packaging/apt/site

  deb-arm64:
    needs: meta
    runs-on: ubuntu-latest
    # Релизы без aarch64 zip (старые теги): job падает по таймауту — не блокируем amd64/apt.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev unzip curl

      - name: Wait for Linux GUI zip on release (aarch64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ needs.meta.outputs.tag }}"
          VER="${{ needs.meta.outputs.ver }}"
          WANT="I2PChat-linux-aarch64-v${VER}.zip"
          for i in $(seq 1 36); do
            if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "$WANT"; then
              echo "Asset present: $WANT"
              exit 0
            fi
            echo "Waiting for $WANT on $REPO@$TAG (try $i/36)..."
            sleep 10
          done
          echo "Timed out waiting for $WANT." >&2
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' >&2 || true
          exit 1

      - name: Wait for Linux TUI zip on release (aarch64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ needs.meta.outputs.tag }}"
          VER="${{ needs.meta.outputs.ver }}"
          WANT="I2PChat-linux-aarch64-tui-v${VER}.zip"
          for i in $(seq 1 36); do
            if gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' | grep -Fxq "$WANT"; then
              echo "Asset present: $WANT"
              exit 0
            fi
            echo "Waiting for $WANT on $REPO@$TAG (try $i/36)..."
            sleep 10
          done
          echo "Timed out waiting for $WANT." >&2
          gh release view "$TAG" --repo "$REPO" --json assets -q '.assets[].name' >&2 || true
          exit 1

      - name: Build .deb from release zip (GUI, arm64)
        env:
          I2PCHAT_DEB_ARCH: arm64
        run: ./packaging/debian/build-deb-from-appimage.sh "${{ needs.meta.outputs.ver }}"

      - name: Build .deb from TUI release zip (arm64)
        env:
          I2PCHAT_DEB_ARCH: arm64
        run: ./packaging/debian/build-tui-deb-from-release-zip.sh "${{ needs.meta.outputs.ver }}"

      - name: Upload arm64 .deb packages to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.meta.outputs.tag }}" \
            "dist/i2pchat_${{ needs.meta.outputs.ver }}_arm64.deb" \
            "dist/i2pchat-tui_${{ needs.meta.outputs.ver }}_arm64.deb" \
            --clobber

  deploy-apt-site:
    name: Deploy apt to GitHub Pages
    needs: deb-amd64
    if: needs.deb-amd64.outputs.apt_publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
