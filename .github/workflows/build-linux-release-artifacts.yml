# Build official Linux GUI + TUI zips on Ubuntu 22.04 (glibc 2.35) so binaries run on
# common LTS distros. Jobs: `build` = x86_64 (ubuntu-22.04), `build-aarch64` = aarch64
# (ubuntu-22.04-arm). Local builds on Fedora 42+ / very new glibc can produce
# "GLIBC_2.42 not found" on older systems — re-upload zips from this workflow.
name: Build Linux release artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release version (v1.2.3, 1.2.3, or typo v.1.2.3) — upload targets Git tag vX.Y.Z"
        required: true
        type: string
      source_ref:
        description: "Ref to build from: main, v1.2.3, 1.2.3, v.1.2.3, or empty (= same as tag)."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      QT_QPA_PLATFORM: offscreen
      I2PCHAT_SKIP_GPG_SIGN: "1"
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - name: Resolve tag and checkout ref
        id: meta
        run: |
          trim() { echo "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          # Strip leading v and a mistaken dot (v.1.2.3 typo -> 1.2.3)
          to_ver() {
            local x
            x="$(trim "$1")"
            x="${x#v}"
            x="${x#.}"
            echo "$x"
          }
          R="$(to_ver "${{ github.event.inputs.tag }}")"
          if [ -z "$R" ]; then
            echo "ERROR: empty tag" >&2
            exit 1
          fi
          if ! echo "$R" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag must be semver X.Y.Z (e.g. v1.2.3), got: ${{ github.event.inputs.tag }}" >&2
            exit 1
          fi
          echo "tag=v${R}" >> "$GITHUB_OUTPUT"
          echo "ver=${R}" >> "$GITHUB_OUTPUT"
          SRC_RAW="$(trim "${{ github.event.inputs.source_ref }}")"
          if [ -z "$SRC_RAW" ]; then
            SRC="v${R}"
          else
            TMP="$(to_ver "$SRC_RAW")"
            if echo "$TMP" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              SRC="v${TMP}"
            else
              SRC="$SRC_RAW"
            fi
          fi
          echo "checkout_ref=${SRC}" >> "$GITHUB_OUTPUT"
          echo "Will build from ref: ${SRC}, upload to release: v${R}"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}

      # Tags like v1.2.3 predate I2PChat-tui.spec / TUI zip in build-linux.sh — users often leave source_ref empty.
      - name: Use main for packaging when tag tree has no TUI spec
        run: |
          VER="${{ steps.meta.outputs.ver }}"
          if [ -f I2PChat-tui.spec ]; then
            echo "I2PChat-tui.spec present — continuing with checked-out ref"
            exit 0
          fi
          echo "No I2PChat-tui.spec here — shallow-fetching origin/main for current packaging scripts"
          git fetch --depth=1 origin main
          git checkout -f FETCH_HEAD
          FILE_VER="$(tr -d '\r\n' < VERSION)"
          if [ "$FILE_VER" != "$VER" ]; then
            echo "ERROR: origin/main VERSION is '$FILE_VER' but release is '$VER'." >&2
            echo "Cannot auto-fallback: set source_ref to a branch/tag whose VERSION matches, or align main." >&2
            exit 1
          fi
          echo "Switched to main (VERSION=$FILE_VER) for build"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget desktop-file-utils file patchelf \
            libfuse2 \
            libgl1-mesa-glx libegl1-mesa \
            libxkbcommon-x11-0 libdbus-1-3 \
            libglib2.0-0 libfontconfig1 libfreetype6 libdrm2 \
            libxcb1 libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0 libxcb-render0 \
            libxcb-shm0 libxcb-randr0 libxcb-keysyms1 libxcb-image0 libxcb-icccm4 \
            libxcb-util1 libxcb-sync1 libxcb-xinput0 libxcb-cursor0

      - name: Build Linux zips (PyInstaller + AppImage)
        run: ./build-linux.sh

      # Fail before upload if the bundle needs glibc newer than Ubuntu 22.04 (e.g. stale local builds).
      - name: Verify TUI zip on clean Ubuntu 22.04 (glibc smoke)
        run: |
          VER="${{ steps.meta.outputs.ver }}"
          export ZIP="I2PChat-linux-x86_64-tui-v${VER}.zip"
          docker run --rm -v "$PWD:/ws:ro" -e "ZIP=$ZIP" ubuntu:22.04 bash -ceu "
            apt-get update -qq
            apt-get install -y -qq unzip ca-certificates
            mkdir -p /tmp/tui
            unzip -q -d /tmp/tui /ws/\$ZIP
            cd /tmp/tui
            set +e
            out=\$(timeout 15 ./i2pchat-tui 2>&1) || true
            if echo \"\$out\" | grep -qi 'GLIBC_.*not found'; then
              echo \"\$out\" | head -40
              echo \"ERROR: TUI needs newer glibc than Ubuntu 22.04 — fix build host / Python\" >&2
              exit 1
            fi
            echo \"TUI smoke OK (no GLIBC mismatch on Ubuntu 22.04)\"
          "

      - name: Verify VERSION matches tag
        run: |
          VER="${{ steps.meta.outputs.ver }}"
          FILE_VER="$(tr -d '\r\n' < VERSION)"
          if [ "$FILE_VER" != "$VER" ]; then
            echo "ERROR: VERSION file is '$FILE_VER' but tag implies '$VER'" >&2
            exit 1
          fi

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VER="${{ steps.meta.outputs.ver }}"
          ZIP_GUI="I2PChat-linux-x86_64-v${VER}.zip"
          ZIP_TUI="I2PChat-linux-x86_64-tui-v${VER}.zip"
          for f in "$ZIP_GUI" "$ZIP_TUI" SHA256SUMS; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing $f" >&2
              echo "Contents of workspace root:" >&2
              ls -la >&2 || true
              echo >&2
              echo "Hint: build-linux.sh should emit TUI zip + two-line SHA256SUMS; check PyInstaller TUI step logs above." >&2
              exit 1
            fi
          done
          gh release upload "$TAG" \
            "$ZIP_GUI" \
            "$ZIP_TUI" \
            SHA256SUMS \
            --repo "${{ github.repository }}" \
            --clobber

  # Same as `build` but on arm64 — produces I2PChat-linux-aarch64-*.zip (not on ubuntu-22.04 amd64).
  build-aarch64:
    runs-on: ubuntu-22.04-arm
    env:
      QT_QPA_PLATFORM: offscreen
      I2PCHAT_SKIP_GPG_SIGN: "1"
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - name: Resolve tag and checkout ref
        id: meta
        run: |
          trim() { echo "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          to_ver() {
            local x
            x="$(trim "$1")"
            x="${x#v}"
            x="${x#.}"
            echo "$x"
          }
          R="$(to_ver "${{ github.event.inputs.tag }}")"
          if [ -z "$R" ]; then
            echo "ERROR: empty tag" >&2
            exit 1
          fi
          if ! echo "$R" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: tag must be semver X.Y.Z (e.g. v1.2.3), got: ${{ github.event.inputs.tag }}" >&2
            exit 1
          fi
          echo "tag=v${R}" >> "$GITHUB_OUTPUT"
          echo "ver=${R}" >> "$GITHUB_OUTPUT"
          SRC_RAW="$(trim "${{ github.event.inputs.source_ref }}")"
          if [ -z "$SRC_RAW" ]; then
            SRC="v${R}"
          else
            TMP="$(to_ver "$SRC_RAW")"
            if echo "$TMP" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              SRC="v${TMP}"
            else
              SRC="$SRC_RAW"
            fi
          fi
          echo "checkout_ref=${SRC}" >> "$GITHUB_OUTPUT"
          echo "Will build aarch64 from ref: ${SRC}, upload to release: v${R}"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}

      - name: Use main for packaging when tag tree has no TUI spec
        run: |
          VER="${{ steps.meta.outputs.ver }}"
          if [ -f I2PChat-tui.spec ]; then
            echo "I2PChat-tui.spec present — continuing with checked-out ref"
            exit 0
          fi
          echo "No I2PChat-tui.spec here — shallow-fetching origin/main for current packaging scripts"
          git fetch --depth=1 origin main
          git checkout -f FETCH_HEAD
          FILE_VER="$(tr -d '\r\n' < VERSION)"
          if [ "$FILE_VER" != "$VER" ]; then
            echo "ERROR: origin/main VERSION is '$FILE_VER' but release is '$VER'." >&2
            echo "Cannot auto-fallback: set source_ref to a branch/tag whose VERSION matches, or align main." >&2
            exit 1
          fi
          echo "Switched to main (VERSION=$FILE_VER) for build"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget desktop-file-utils file patchelf \
            libfuse2 \
            libgl1-mesa-glx libegl1-mesa \
            libxkbcommon-x11-0 libdbus-1-3 \
            libglib2.0-0 libfontconfig1 libfreetype6 libdrm2 \
            libxcb1 libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0 libxcb-render0 \
            libxcb-shm0 libxcb-randr0 libxcb-keysyms1 libxcb-image0 libxcb-icccm4 \
            libxcb-util1 libxcb-sync1 libxcb-xinput0 libxcb-cursor0

      - name: Detect bundled i2pd (aarch64)
        run: |
          if [ -f vendor/i2pd/linux-aarch64/i2pd ]; then
            chmod +x vendor/i2pd/linux-aarch64/i2pd
            echo "Bundled aarch64 i2pd found; release artifacts may embed it."
          else
            echo "No bundled aarch64 i2pd found; building portable artifacts without embedded router."
          fi

      - name: Build Linux aarch64 zips (PyInstaller + AppImage)
        run: ./build-linux.sh

      - name: Verify TUI zip on clean Ubuntu 22.04 arm64 (glibc smoke)
        run: |
          VER="${{ steps.meta.outputs.ver }}"
          export ZIP="I2PChat-linux-aarch64-tui-v${VER}.zip"
          docker run --rm -v "$PWD:/ws:ro" -e "ZIP=$ZIP" ubuntu:22.04 bash -ceu "
            apt-get update -qq
            apt-get install -y -qq unzip ca-certificates
            mkdir -p /tmp/tui
            unzip -q -d /tmp/tui /ws/\$ZIP
            cd /tmp/tui
            set +e
            out=\$(timeout 15 ./i2pchat-tui 2>&1) || true
            if echo \"\$out\" | grep -qi 'GLIBC_.*not found'; then
              echo \"\$out\" | head -40
              echo \"ERROR: TUI needs newer glibc than Ubuntu 22.04 — fix build host / Python\" >&2
              exit 1
            fi
            echo \"TUI smoke OK (no GLIBC mismatch on Ubuntu 22.04 arm64)\"
          "

      - name: Verify VERSION matches tag
        run: |
          VER="${{ steps.meta.outputs.ver }}"
          FILE_VER="$(tr -d '\r\n' < VERSION)"
          if [ "$FILE_VER" != "$VER" ]; then
            echo "ERROR: VERSION file is '$FILE_VER' but tag implies '$VER'" >&2
            exit 1
          fi

      - name: Upload aarch64 assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VER="${{ steps.meta.outputs.ver }}"
          ZIP_GUI="I2PChat-linux-aarch64-v${VER}.zip"
          ZIP_TUI="I2PChat-linux-aarch64-tui-v${VER}.zip"
          for f in "$ZIP_GUI" "$ZIP_TUI" SHA256SUMS; do
            if [ ! -f "$f" ]; then
              echo "ERROR: missing $f" >&2
              ls -la >&2 || true
              exit 1
            fi
          done
          cp SHA256SUMS SHA256SUMS.linux-aarch64
          gh release upload "$TAG" \
            "$ZIP_GUI" \
            "$ZIP_TUI" \
            SHA256SUMS.linux-aarch64 \
            --repo "${{ github.repository }}" \
            --clobber
