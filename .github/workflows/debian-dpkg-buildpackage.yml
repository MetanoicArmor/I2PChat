# Debian source package check (dpkg-buildpackage + lintian + autopkgtest).
# Runs in debian:sid so Depends i2pd (>= 2.59~) is satisfiable from the archive.
# Local equivalent: packaging/debian/docker-dpkg-buildpackage.sh
# (on non-amd64 hosts use DEBIAN_DOCKER_PLATFORM=linux/amd64 for sponsor-facing builds)
#
# dpkg-buildpackage writes to the parent of the source tree (..). We copy into
# debian-ci-out/ so autopkgtest cannot strand later steps.
name: Debian dpkg-buildpackage

on:
  push:
    branches: [main]
    paths:
      - "debian/**"
      - "packaging/debian/docker-dpkg-buildpackage.sh"
      - "pyproject.toml"
      - "VERSION"
      - "i2pchat/**"
      - ".github/workflows/debian-dpkg-buildpackage.yml"
  pull_request:
    paths:
      - "debian/**"
      - "packaging/debian/docker-dpkg-buildpackage.sh"
      - "pyproject.toml"
      - "VERSION"
      - "i2pchat/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dpkg-buildpackage:
    runs-on: ubuntu-latest
    defaults:
      run:
        # debian:sid default /bin/sh is dash — no shopt/nullglob (used below).
        shell: bash
    container:
      image: debian:sid
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Debian build toolchain
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            autopkgtest \
            build-essential \
            ca-certificates \
            debhelper \
            devscripts \
            dh-python \
            fakeroot \
            git \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-hatchling

      - name: dpkg-buildpackage (unsigned, full native upload)
        run: dpkg-buildpackage -us -uc

      - name: Stage built packages inside workspace
        run: |
          mkdir -p debian-ci-out
          rm -f debian-ci-out/*
          ver="$(dpkg-parsechangelog -l debian/changelog -SVersion)"
          arch="$(dpkg-architecture -qDEB_BUILD_ARCH)"
          for f in \
            "../i2pchat_${ver}.dsc" \
            "../i2pchat_${ver}.tar.xz" \
            "../i2pchat_${ver}_${arch}.buildinfo" \
            "../i2pchat_${ver}_${arch}.changes" \
            "../python3-i2pchat_${ver}_all.deb" \
            "../i2pchat_${ver}_all.deb" \
            "../i2pchat-tui_${ver}_all.deb"; do
            test -e "$f" || { echo "missing $f" >&2; exit 1; }
            cp "$f" debian-ci-out/
          done
          ls -la debian-ci-out/

      - name: Upload binaries and metadata (artifact)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: debian-packages-${{ github.run_id }}
          path: |
            debian-ci-out/*.deb
            debian-ci-out/*.changes
            debian-ci-out/*.buildinfo
            debian-ci-out/*.dsc

      - name: lintian (errors only; bitmask exit may be 4/8 if only warnings/info)
        run: |
          shopt -s nullglob
          ch=(debian-ci-out/*.changes)
          [ "${#ch[@]}" -eq 1 ]
          set +e
          lintian -E "${ch[0]}"
          e=$?
          set -e
          if [ "$e" -ne 0 ] && [ "$e" -ne 1 ] && [ "$e" -ne 4 ] && [ "$e" -ne 8 ]; then exit "$e"; fi

      - name: autopkgtest (virt null; may exit non-zero on superficial PASS)
        run: |
          shopt -s nullglob
          ch=(debian-ci-out/*.changes)
          [ "${#ch[@]}" -eq 1 ]
          set +o pipefail
          set +e
          autopkgtest "${ch[0]}" -- null 2>&1 | tee /tmp/autopkgtest.log
          set -e
          set -o pipefail
          if grep -E '^[a-zA-Z0-9_.-]+[[:space:]]+FAIL' /tmp/autopkgtest.log; then exit 2; fi

      - name: Install staged packages for payload checks
        run: |
          shopt -s nullglob
          debs=(debian-ci-out/*.deb)
          [ "${#debs[@]}" -ge 1 ]
          apt_debs=()
          for d in "${debs[@]}"; do apt_debs+=("./$d"); done
          apt-get install --reinstall -y -qq "${apt_debs[@]}"

      - name: Verify system-router-only marker
        run: |
          marker=/usr/share/i2pchat/system-router-only
          test -f "$marker"
          grep -q 'system i2pd' "$marker"

      - name: Verify no i2pd binary shipped in python3-i2pchat
        run: |
          if dpkg -L python3-i2pchat | grep -E '(^|/)i2pd$'; then
            echo "ERROR: i2pd binary must not be in python3-i2pchat (Debian uses system i2pd)" >&2
            exit 1
          fi
