# First-class Debian source package check (dpkg-buildpackage + lintian + autopkgtest).
# Local equivalent when Docker runs: packaging/debian/docker-dpkg-buildpackage.sh
#
# dpkg-buildpackage writes to the parent of the source tree (..). We copy into
# debian-ci-out/ so autopkgtest cannot strand later steps.
name: Debian dpkg-buildpackage

on:
  push:
    branches: [main]
    paths:
      - "debian/**"
      - "packaging/debian/docker-dpkg-buildpackage.sh"
      - "pyproject.toml"
      - "VERSION"
      - "i2pchat/**"
      - ".github/workflows/debian-dpkg-buildpackage.yml"
  pull_request:
    paths:
      - "debian/**"
      - "packaging/debian/docker-dpkg-buildpackage.sh"
      - "pyproject.toml"
      - "VERSION"
      - "i2pchat/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dpkg-buildpackage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Debian build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            autopkgtest \
            build-essential \
            debhelper \
            devscripts \
            dh-python \
            fakeroot \
            lintian \
            pybuild-plugin-pyproject \
            python3-all \
            python3-hatchling

      - name: dpkg-buildpackage (binary, unsigned)
        run: dpkg-buildpackage -us -uc -b

      - name: Stage built packages inside workspace
        run: |
          mkdir -p debian-ci-out
          shopt -s nullglob
          cp ../*.deb ../*.changes ../*.buildinfo debian-ci-out/
          ls -la debian-ci-out/

      - name: Upload .deb and .changes (artifact)
        uses: actions/upload-artifact@4cec3e8a04b39d1a68300aeed7a93c7a9f4a636d # v4
        with:
          name: debian-packages-${{ github.run_id }}
          path: debian-ci-out/

      - name: lintian (errors only; bitmask exit may be 4/8 if only warnings/info)
        run: |
          shopt -s nullglob
          ch=(debian-ci-out/*.changes)
          [ "${#ch[@]}" -eq 1 ]
          set +e
          lintian -E "${ch[0]}"
          e=$?
          set -e
          if [ "$e" -ne 0 ] && [ "$e" -ne 1 ] && [ "$e" -ne 4 ] && [ "$e" -ne 8 ]; then exit "$e"; fi

      - name: autopkgtest (virt null; may exit non-zero on superficial PASS)
        run: |
          shopt -s nullglob
          ch=(debian-ci-out/*.changes)
          [ "${#ch[@]}" -eq 1 ]
          set +o pipefail
          set +e
          autopkgtest "${ch[0]}" -- null 2>&1 | tee /tmp/autopkgtest.log
          set -e
          set -o pipefail
          if grep -E '^[a-zA-Z0-9_.-]+[[:space:]]+FAIL' /tmp/autopkgtest.log; then exit 2; fi

      - name: Install staged packages for payload checks
        run: |
          shopt -s nullglob
          debs=(debian-ci-out/*.deb)
          [ "${#debs[@]}" -ge 1 ]
          apt_debs=()
          for d in "${debs[@]}"; do apt_debs+=("./$d"); done
          sudo apt-get install --reinstall -y -qq "${apt_debs[@]}"

      - name: Verify system-router-only marker
        run: |
          marker=/usr/share/i2pchat/system-router-only
          test -f "$marker"
          grep -q 'system i2pd' "$marker"

      - name: Verify no i2pd binary shipped in python3-i2pchat
        run: |
          if dpkg -L python3-i2pchat | grep -E '(^|/)i2pd$'; then
            echo "ERROR: i2pd binary must not be in python3-i2pchat (Debian uses system i2pd)" >&2
            exit 1
          fi
