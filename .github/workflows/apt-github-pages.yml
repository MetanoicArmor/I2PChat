# Rebuild the signed apt site from release .deb (amd64 required; arm64 optional if present).
# Deploy via GitHub Actions → Pages (artifact). Set repository Pages source to "GitHub Actions".
name: Publish apt mirror (GitHub Pages)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version x.y.z — amd64 .deb required on vx.y.z; arm64 pair optional (retried up to ~6 min)"
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: apt-github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve version
        id: meta
        run: |
          VER="${{ github.event.inputs.version }}"
          VER="$(echo "$VER" | tr -d ' \t\r\n')"
          VER="${VER#v}"
          if [ -z "$VER" ]; then
            echo "ERROR: empty version" >&2
            exit 1
          fi
          echo "ver=$VER" >> "$GITHUB_OUTPUT"

      - name: Require signing secret
        env:
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${APT_REPO_GPG_PRIVATE_KEY:-}" ]; then
            echo "ERROR: set repository secret APT_REPO_GPG_PRIVATE_KEY (see packaging/apt/README.md)" >&2
            exit 1
          fi

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dpkg-dev apt-utils gnupg curl

      - name: Download .deb packages from release
        id: debs
        run: |
          set -euo pipefail
          VER="${{ steps.meta.outputs.ver }}"
          REPO="${{ github.repository }}"
          BASE="https://github.com/${REPO}/releases/download/v${VER}"
          download_one() {
            local deb="$1"
            local url="${BASE}/${deb}"
            local i
            for i in $(seq 1 36); do
              if curl -fsSL --connect-timeout 30 --max-time 600 -o "$deb" "$url"; then
                echo "Downloaded $deb"
                ls -la "$deb"
                return 0
              fi
              echo "WARN: download failed (${i}/36): ${url}"
              sleep 10
            done
            echo "ERROR: could not download ${url}" >&2
            return 1
          }
          download_one "i2pchat_${VER}_amd64.deb"
          download_one "i2pchat-tui_${VER}_amd64.deb"
          HAS_ARM64=false
          for i in $(seq 1 36); do
            if curl -fsSL --connect-timeout 30 --max-time 600 -o "i2pchat_${VER}_arm64.deb" "${BASE}/i2pchat_${VER}_arm64.deb" \
              && curl -fsSL --connect-timeout 30 --max-time 600 -o "i2pchat-tui_${VER}_arm64.deb" "${BASE}/i2pchat-tui_${VER}_arm64.deb"; then
              echo "Downloaded arm64 .deb pair"
              HAS_ARM64=true
              break
            fi
            echo "WARN: arm64 .deb not yet available (${i}/36): ${BASE}/i2pchat_${VER}_arm64.deb"
            sleep 10
          done
          if [ "$HAS_ARM64" = true ]; then
            echo "has_arm64=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_arm64=false" >> "$GITHUB_OUTPUT"
            echo "WARN: building apt site amd64-only (no arm64 pair on release)"
          fi

      - name: Build and sign apt site
        env:
          VERSION: ${{ steps.meta.outputs.ver }}
          DEB_PATH: ${{ github.workspace }}/i2pchat_${{ steps.meta.outputs.ver }}_amd64.deb
          DEB_PATH_2: ${{ github.workspace }}/i2pchat-tui_${{ steps.meta.outputs.ver }}_amd64.deb
          APT_REPO_GPG_PRIVATE_KEY: ${{ secrets.APT_REPO_GPG_PRIVATE_KEY }}
          APT_REPO_GPG_PASSPHRASE: ${{ secrets.APT_REPO_GPG_PASSPHRASE }}
        run: |
          chmod +x packaging/apt/scripts/build-apt-site.sh packaging/apt/scripts/sign-release.sh
          VER="${{ steps.meta.outputs.ver }}"
          if [ "${{ steps.debs.outputs.has_arm64 }}" = "true" ]; then
            export DEB_ARM64_PATH="${{ github.workspace }}/i2pchat_${VER}_arm64.deb"
            export DEB_ARM64_PATH_2="${{ github.workspace }}/i2pchat-tui_${VER}_arm64.deb"
          fi
          ./packaging/apt/scripts/build-apt-site.sh
          echo "$APT_REPO_GPG_PRIVATE_KEY" | gpg --import --batch
          ./packaging/apt/scripts/sign-release.sh

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload apt site (Pages artifact)
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: packaging/apt/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
